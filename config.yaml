api_endpoints:
  openclaw_gateway: http://127.0.0.1:18789/v1
model_escalation_policy: true
orchestrator:
  runtime: pydanticai
  allow_fallback: true
  max_stall_count: 3
  max_replan: 4
  max_steps_total: 50
workers:
  default_max_retries: 5
  studio-dev:
    default_tier: openclaw_gateway
    allowed_write_paths:
    - /home/jul/.openclaw/workspace/langgraph-swarm/
    - /home/jul/.openclaw/
    auto_lint_patch: true
  dev-ops:
    default_tier: openclaw_gateway
    blocked_commands:
    - rm -rf /
    - mkfs
    - sudo
  veille-strategique:
    default_tier: openclaw_gateway
    max_search_depth: 3
